[tool.ruff]
line-length = 100
target-version = "py312"

exclude = [
  ".venv",
  "venv",
  ".pytest_cache",
  ".ruff_cache",
  "__pycache__",
  "*.db",
  "logs",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"api/**/*.py" = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]